- type: entity
  parent: Syringe
  id: CMSyringe
  suffix: CM14
  components:
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: syringe
  - type: Sprite
    sprite: _CM14/Objects/Medical/syringe.rsi
    layers:
    - state: syringe
      map: [ "enum.SolutionContainerLayers.Base" ]
    - state: syringe1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: Icon
    sprite: _CM14/Objects/Medical/syringe.rsi
    state: "syringe"
  - type: Item
    storedRotation: 90
    size: Tiny
    sprite: _CM14/Objects/Medical/syringe.rsi

- type: entity
  id: CMSurgeryTray
  parent: BoxBase
  name: surgical tray
  description: A small metallic tray covered in sterile tarp. Intended to store surgical tools in a neat and clean fashion.
  components:
  - type: Sprite
    sprite: _CM14/Objects/Medical/Surgery/surgery_tray.rsi
    layers:
    - state: empty
    - state: full
      map: ["full"]
      visible: false
  - type: Item
    sprite: _CM14/Objects/Medical/Surgery/surgery_tray.rsi
    size: Large
    shape: null
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,20,1
    whitelist:
      tags:
      - SurgeryTool
      - CMSurgicalLine
      - CMSynthGraft
      - CMTraumaKit
  - type: ItemMapper
    mapLayers:
      full:
        whitelist:
          tags:
          - SurgeryTool
          - CMSurgicalLine
          - CMSynthGraft
          - CMTraumaKit
  - type: Appearance
